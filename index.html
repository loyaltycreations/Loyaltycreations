<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: gold;
      text-align: center;
      padding: 40px 20px;
    }

    img {
      max-width: 500px;
      width: 90%;
      border-radius: 20px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      color: #ddd;
      margin: 10px 0;
    }

    a {
      color: gold;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .phone-icon {
      color: #00ff00;
      margin-right: 8px;
      animation: glow 1.5s infinite alternate;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 5px #00ff00;
      }
      to {
        text-shadow: 0 0 20px #00ff00;
      }
    }

    .call-btn {

      background: #00ff00;
      color: black;
      padding: 15px 20px;
      border-radius: 50px;
